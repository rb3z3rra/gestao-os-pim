<section class="fixed top-4 right-4 z-[70] flex w-full max-w-sm flex-col gap-3 pointer-events-none">
  @for (message of toast.messages(); track message.id) {
    <article
      class="pointer-events-auto rounded-xl border px-4 py-3 shadow-2xl backdrop-blur-sm"
      [class]="kindClass(message.kind)"
    >
      <div class="flex items-start gap-3">
        <div class="flex-1 text-sm font-medium">{{ message.text }}</div>
        <button
          type="button"
          class="text-current/70 hover:text-current transition-colors"
          (click)="toast.dismiss(message.id)"
        >
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>
    </article>
  }
</section>
