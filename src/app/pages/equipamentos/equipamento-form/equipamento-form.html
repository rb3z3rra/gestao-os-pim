<section class="p-8 pt-24 max-w-3xl">
  <header class="flex items-center gap-4 mb-8">
    <app-back-button fallback="/equipamentos" />
    <div>
      <h1 class="text-3xl font-bold font-headline text-slate-100">
        {{ isEdit() ? 'Editar Equipamento' : 'Novo Equipamento' }}
      </h1>
      <p class="text-sm text-slate-400 mt-1">Dados do ativo industrial</p>
    </div>
  </header>

  @if (error()) {
    <div class="bg-red-900/20 border border-red-900 text-red-300 p-4 rounded-lg mb-6">{{ error() }}</div>
  }

  <form (ngSubmit)="onSubmit()" #f="ngForm" class="bg-slate-900/40 border border-slate-800 rounded-xl p-8 space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Código *</label>
        <input name="codigo" [(ngModel)]="model.codigo" required minlength="2"
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 font-mono focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Nome *</label>
        <input name="nome" [(ngModel)]="model.nome" required minlength="2"
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Tipo *</label>
        <input name="tipo" [(ngModel)]="model.tipo" required
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Localização *</label>
        <input name="localizacao" [(ngModel)]="model.localizacao" required
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Setor *</label>
        <input name="setor" [(ngModel)]="model.setor" required
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Número de Patrimônio</label>
        <input name="numero_patrimonio" [(ngModel)]="model.numero_patrimonio"
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Fabricante</label>
        <input name="fabricante" [(ngModel)]="model.fabricante"
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Modelo</label>
        <input name="modelo" [(ngModel)]="model.modelo"
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Última Revisão</label>
        <input name="ultima_revisao" type="date" [(ngModel)]="model.ultima_revisao"
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
    </div>

    <label class="flex items-center gap-3 cursor-pointer">
      <input name="ativo" type="checkbox" [(ngModel)]="model.ativo" class="w-4 h-4" />
      <span class="text-sm text-slate-300">Equipamento ativo</span>
    </label>

    <div class="flex gap-3 pt-4 border-t border-slate-800">
      <button type="submit" [disabled]="f.invalid || loading()"
        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed font-semibold">
        {{ loading() ? 'Salvando...' : 'Salvar' }}
      </button>
      <a [routerLink]="['/equipamentos']"
        class="px-6 py-3 border border-slate-700 text-slate-300 rounded-lg hover:bg-slate-800 font-semibold">
        Cancelar
      </a>
    </div>
  </form>
</section>
