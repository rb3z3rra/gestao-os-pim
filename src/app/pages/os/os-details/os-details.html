<section class="p-8 pt-24 max-w-6xl">
  <header class="flex items-center gap-4 mb-8">
    <app-back-button fallback="/ordens-de-servico" />
    @if (os(); as o) {
      <div class="flex-1">
        <div class="flex items-center gap-3">
          <h1 class="text-3xl font-bold font-headline text-slate-100">{{ o.numero }}</h1>
          <span class="text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-wider" [class]="statusClass(o.status)">
            {{ o.status | statusLabel }}
          </span>
        </div>
        <p class="text-sm text-slate-400 mt-1">Aberta em {{ o.abertura_em | date:'dd/MM/yyyy HH:mm' }}</p>
      </div>
    }
  </header>

  @if (loading()) {
    <div class="text-slate-400 py-12 text-center">Carregando...</div>
  } @else if (error()) {
    <div class="bg-red-900/20 border border-red-900 text-red-300 p-4 rounded-lg">{{ error() }}</div>
  } @else if (os(); as o) {
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 space-y-6">
        <app-os-summary-card [ordem]="o" />
        @if (!isSolicitante()) {
          <app-os-worklogs-card [apontamentos]="apontamentos()" />
          <app-os-history-card [historico]="historico()" />
        }
      </div>

      @if (!isSolicitante()) {
        <app-os-workflow-actions
          [canAssumir]="canAssumir()"
          [canAtribuirTecnico]="canAtribuirTecnico()"
          [atribuirBloqueado]="atribuirBloqueado()"
          [canIniciar]="canIniciar()"
          [canAtualizarStatus]="canAtualizarStatus()"
          [canIniciarTrabalho]="canIniciarTrabalho()"
          [canFinalizarTrabalho]="canFinalizarTrabalho()"
          [canConcluir]="canConcluir()"
          [action]="action()"
          [tecnicos]="tecnicos()"
          [tecnicoSelecionado]="tecnicoSelecionado()"
          [novoStatus]="novoStatus()"
          [availableStatusOptions]="availableStatusOptions()"
          [observacaoStatus]="observacaoStatus()"
          [observacaoApontamento]="observacaoApontamento()"
          [descricaoServico]="conclusao.descricao_servico"
          [pecasUtilizadas]="conclusao.pecas_utilizadas"
          (tecnicoSelecionadoChange)="tecnicoSelecionado.set($event)"
          (novoStatusChange)="novoStatus.set($event)"
          (observacaoStatusChange)="observacaoStatus.set($event)"
          (observacaoApontamentoChange)="observacaoApontamento.set($event)"
          (descricaoServicoChange)="conclusao.descricao_servico = $event"
          (pecasUtilizadasChange)="conclusao.pecas_utilizadas = $event"
          (assumirClicked)="assumir()"
          (atribuirClicked)="atribuirTecnico()"
          (iniciarClicked)="iniciar()"
          (atualizarStatusClicked)="atualizarStatus()"
          (iniciarTrabalhoClicked)="iniciarTrabalho()"
          (finalizarTrabalhoClicked)="finalizarTrabalho()"
          (concluirClicked)="concluir()" />
      }
    </div>
  }
</section>
