<section class="max-w-3xl px-4 pb-8 pt-24 sm:px-6 lg:px-8">
  <header class="mb-8 flex items-start gap-3 sm:items-center sm:gap-4">
    <app-back-button fallback="/usuarios" />
    <div>
      <h1 class="text-3xl font-bold font-headline text-slate-100">
        {{ isEdit() ? 'Editar Usuário' : 'Novo Usuário' }}
      </h1>
      <p class="text-sm text-slate-400 mt-1">Preencha os dados da conta</p>
    </div>
  </header>

  @if (error()) {
    <div class="bg-red-900/20 border border-red-900 text-red-300 p-4 rounded-lg mb-6">{{ error() }}</div>
  }

  <form (ngSubmit)="onSubmit()" #f="ngForm" class="space-y-6 rounded-xl border border-slate-800 bg-slate-900/40 p-5 sm:p-8">
    <div>
      <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Nome *</label>
      <input name="nome" [(ngModel)]="model.nome" required minlength="3"
        class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Email *</label>
        <input name="email" type="email" [(ngModel)]="model.email" required
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Matrícula *</label>
        <input name="matricula" [(ngModel)]="model.matricula" required
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none font-mono" />
      </div>
    </div>

    <div>
      <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">
        Senha {{ isEdit() ? '(deixe em branco para não alterar)' : '*' }}
      </label>
      <input name="senha" type="password" [(ngModel)]="model.senha" [required]="!isEdit()" minlength="6"
        class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Perfil *</label>
        <select name="perfil" [(ngModel)]="model.perfil" required
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
          @for (p of perfis; track p) {
            <option [value]="p">{{ p }}</option>
          }
        </select>
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Setor</label>
        <input name="setor" [(ngModel)]="model.setor"
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none" />
      </div>
    </div>

    <label class="flex items-center gap-3 cursor-pointer">
      <input name="ativo" type="checkbox" [(ngModel)]="model.ativo" class="w-4 h-4" />
      <span class="text-sm text-slate-300">Usuário ativo</span>
    </label>

    <div class="flex flex-col gap-3 border-t border-slate-800 pt-4 sm:flex-row">
      <button type="submit" [disabled]="f.invalid || loading()"
        class="rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-50">
        {{ loading() ? 'Salvando...' : 'Salvar' }}
      </button>
      <a [routerLink]="['/usuarios']"
        class="rounded-lg border border-slate-700 px-6 py-3 text-center font-semibold text-slate-300 hover:bg-slate-800">
        Cancelar
      </a>
    </div>
  </form>
</section>
