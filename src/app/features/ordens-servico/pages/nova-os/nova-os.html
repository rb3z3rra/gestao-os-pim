<section class="max-w-3xl px-4 pb-8 pt-24 sm:px-6 lg:px-8">
  <header class="mb-8 flex items-start gap-3 sm:items-center sm:gap-4">
    <app-back-button fallback="/ordens-de-servico" />
    <div>
      <h1 class="text-2xl font-bold font-headline text-slate-100 sm:text-3xl">Nova Ordem de Serviço</h1>
      <p class="text-sm text-slate-400 mt-1">Abrir solicitação de manutenção</p>
    </div>
  </header>

  @if (error()) {
    <div class="bg-red-900/20 border border-red-900 text-red-300 p-4 rounded-lg mb-6">{{ error() }}</div>
  }

  <form (ngSubmit)="onSubmit()" #f="ngForm" class="space-y-6 rounded-xl border border-slate-800 bg-slate-900/40 p-5 sm:p-8">
    <div>
      <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Equipamento *</label>
      <select name="equipamento" [(ngModel)]="model.equipamentoId" required
        class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
        <option [ngValue]="null">Selecione...</option>
        @for (e of equipamentos(); track e.id) {
          <option [ngValue]="e.id">{{ e.codigo }} — {{ e.nome }} ({{ e.localizacao }})</option>
        }
      </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Tipo de Manutenção *</label>
        <select name="tipo" [(ngModel)]="model.tipo_manutencao" required
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
          @for (t of tipos; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Prioridade *</label>
        <select name="prioridade" [(ngModel)]="model.prioridade" required
          class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none">
          @for (p of prioridades; track p) {
            <option [value]="p">{{ p }}</option>
          }
        </select>
      </div>
    </div>

    <div>
      <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Descrição da Falha *</label>
      <textarea name="descricao" [(ngModel)]="model.descricao_falha" required minlength="5" rows="6"
        placeholder="Descreva em detalhe o problema identificado..."
        class="w-full bg-slate-800/60 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
    </div>

    <div class="flex flex-col gap-3 border-t border-slate-800 pt-4 sm:flex-row">
      <button type="submit" [disabled]="f.invalid || loading()"
        class="rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-50">
        {{ loading() ? 'Criando...' : 'Criar Ordem' }}
      </button>
      <a [routerLink]="['/ordens-de-servico']"
        class="rounded-lg border border-slate-700 px-6 py-3 text-center font-semibold text-slate-300 hover:bg-slate-800">
        Cancelar
      </a>
    </div>
  </form>
</section>
