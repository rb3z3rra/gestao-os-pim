name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SHORT_SHA: ${{ github.sha }}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: gestao-os-pim-Patrese

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: patrese-ebs/servicoPim-API-Patrese
          path: servicoPim-API-Patrese

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gestao-os-pim-Patrese/package-lock.json

      - name: Start E2E environment
        working-directory: gestao-os-pim-Patrese
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for frontend and API (via nginx proxy)
        working-directory: gestao-os-pim-Patrese
        run: |
          echo "Aguardando frontend em localhost:3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend respondendo!"
              break
            fi
            echo "Tentativa $i/30..."
            sleep 3
          done
          echo "Aguardando API via proxy nginx em localhost:3000/api/health..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "API pronta!"
              exit 0
            fi
            echo "Tentativa $i/60..."
            sleep 5
          done
          echo "ERRO: API nao ficou pronta em 5 minutos"
          docker compose -f docker-compose.e2e.yml ps
          docker compose -f docker-compose.e2e.yml logs api
          docker compose -f docker-compose.e2e.yml logs frontend
          exit 1

      - name: Run backend seed (usuários e dados @seed.local)
        working-directory: gestao-os-pim-Patrese
        run: docker compose -f docker-compose.e2e.yml exec -T api node dist/src/scripts/seed.js

      - name: Seed test database (usuário admin CI)
        working-directory: gestao-os-pim-Patrese
        run: bash cypress/seeds/seed-e2e.sh

      - name: Override baseUrl in cypress.config.ts
        working-directory: gestao-os-pim-Patrese
        run: |
          sed -i "s|baseUrl: '[^']*'|baseUrl: 'http://localhost:3000'|" cypress.config.ts

      - name: Install frontend dependencies
        working-directory: gestao-os-pim-Patrese
        run: npm install

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: gestao-os-pim-Patrese
          browser: chrome
          headed: false
          install: false
        env:
          CYPRESS_supervisor_email: admin@pim.com
          CYPRESS_supervisor_senha: Admin@123

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: gestao-os-pim-Patrese/cypress/screenshots

      - name: Show docker logs on failure
        if: failure()
        working-directory: gestao-os-pim-Patrese
        run: |
          docker compose -f docker-compose.e2e.yml ps
          docker compose -f docker-compose.e2e.yml logs api
          docker compose -f docker-compose.e2e.yml logs frontend

      - name: Teardown E2E environment
        if: always()
        working-directory: gestao-os-pim-Patrese
        run: docker compose -f docker-compose.e2e.yml down -v

  build-and-push:
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Atualiza tag do frontend no docker-compose.yml
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|image: ghcr.io/rpd-infotech/gestao-os-pim:.*|image: ghcr.io/rpd-infotech/gestao-os-pim:${SHA}|" docker-compose.yml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docker-compose.yml
          git diff --staged --quiet || git commit -m "ci: atualiza imagem frontend para ${SHA} [skip ci]"
          git pull --rebase
          git push

      - name: Redeploy stack no Portainer
        run: curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
