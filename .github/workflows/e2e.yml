name: E2E Tests (Cypress)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
        env:
          CYPRESS_baseUrl: https://manuos.izitecnologia.com.br
          CYPRESS_supervisor_email: ${{ secrets.CYPRESS_SUPERVISOR_EMAIL }}
          CYPRESS_supervisor_senha: ${{ secrets.CYPRESS_SUPERVISOR_SENHA }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
