name: E2E Tests (Cypress)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  cypress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: gestao-os-pim

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: rb3z3rra/servicoPim-API
          path: servicoPim-API

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gestao-os-pim/package-lock.json

      - name: Start E2E environment
        working-directory: gestao-os-pim
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for frontend and API (via nginx proxy)
        working-directory: gestao-os-pim
        run: |
          echo "Aguardando frontend em localhost:3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend respondendo!"
              break
            fi
            echo "Tentativa $i/30..."
            sleep 3
          done
          echo "Aguardando API via proxy nginx em localhost:3000/api/health..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "API pronta!"
              exit 0
            fi
            echo "Tentativa $i/60..."
            sleep 5
          done
          echo "ERRO: API nao ficou pronta em 5 minutos"
          docker compose -f docker-compose.e2e.yml ps
          docker compose -f docker-compose.e2e.yml logs api
          docker compose -f docker-compose.e2e.yml logs frontend
          exit 1

      - name: Seed test database
        working-directory: gestao-os-pim
        run: bash cypress/seeds/seed-e2e.sh

      - name: Override baseUrl in cypress.config.ts
        working-directory: gestao-os-pim
        run: |
          sed -i "s|baseUrl: 'https://manuos.izitecnologia.com.br'|baseUrl: 'http://localhost:3000'|" cypress.config.ts
          echo "--- cypress.config.ts ---"
          cat cypress.config.ts

      - name: Install frontend dependencies
        working-directory: gestao-os-pim
        run: npm install

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: gestao-os-pim
          browser: chrome
          headed: false
          install: false
        env:
          CYPRESS_supervisor_email: admin@pim.com
          CYPRESS_supervisor_senha: Admin@123

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: gestao-os-pim/cypress/screenshots

      - name: Show docker logs on failure
        if: failure()
        working-directory: gestao-os-pim
        run: |
          echo "=== docker compose ps ==="
          docker compose -f docker-compose.e2e.yml ps
          echo "=== API logs ==="
          docker compose -f docker-compose.e2e.yml logs api
          echo "=== Frontend logs ==="
          docker compose -f docker-compose.e2e.yml logs frontend

      - name: Teardown E2E environment
        if: always()
        working-directory: gestao-os-pim
        run: docker compose -f docker-compose.e2e.yml down -v
