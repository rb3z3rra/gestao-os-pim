name: E2E Tests (Cypress)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
      # Checkout do frontend
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: gestao-os-pim

      # Checkout da API (backend)
      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: rb3z3rra/servicoPim-API
          path: servicoPim-API

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gestao-os-pim/package-lock.json

      # Instala dependências do front
      - name: Install frontend dependencies
        working-directory: gestao-os-pim
        run: npm ci

      # Cria o .env.e2e (CORREÇÃO PRINCIPAL)
      - name: Create .env.e2e
        working-directory: gestao-os-pim
        run: |
          echo "CYPRESS_BASE_URL=http://localhost:3000" >> .env.e2e
          echo "CYPRESS_supervisor_email=supervisor@seed.local" >> .env.e2e
          echo "CYPRESS_supervisor_senha=seed123" >> .env.e2e

      # Executa testes E2E
      - name: Run Cypress E2E suite
        working-directory: gestao-os-pim
        run: bash src/scripts/test-e2e.sh

      # Upload screenshots em caso de erro
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: gestao-os-pim/cypress/screenshots
          if-no-files-found: ignore
