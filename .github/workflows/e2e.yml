name: E2E Tests (Cypress)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: gestao-os-pim

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: rb3z3rra/servicoPim-API
          path: servicoPim-API

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gestao-os-pim/package-lock.json

      - name: Create .env.e2e
        working-directory: gestao-os-pim
        run: |
          echo "CYPRESS_BASE_URL=http://localhost:3000" >> .env.e2e
          echo "CYPRESS_supervisor_email=supervisor@seed.local" >> .env.e2e
          echo "CYPRESS_supervisor_senha=seed123" >> .env.e2e

      - name: Start E2E environment
        working-directory: gestao-os-pim
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for frontend and API (via nginx proxy)
        working-directory: gestao-os-pim
        run: |
          echo "Aguardando frontend em localhost:3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend respondendo!"
              break
            fi
            echo "Tentativa $i/30..."
            sleep 3
          done

          echo "Aguardando API via proxy nginx em localhost:3000/api/health..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "API pronta!"
              exit 0
            fi
            echo "Tentativa $i/60..."
            sleep 5
          done

          echo "ERRO: API nao ficou pronta em 5 minutos"
          docker compose -f docker-compose.e2e.yml ps
          docker compose -f docker-compose.e2e.yml logs api
          docker compose -f docker-compose.e2e.yml logs frontend
          exit 1

      - name: Run backend seed (usuários e dados @seed.local)
        working-directory: gestao-os-pim
        run: docker compose -f docker-compose.e2e.yml exec -T api node dist/src/scripts/seed.js

      - name: Seed test database (usuário admin CI)
        working-directory: gestao-os-pim
        run: bash cypress/seeds/seed-e2e.sh

      - name: Override baseUrl in cypress.config.ts
        working-directory: gestao-os-pim
        run: |
          sed -i "s|baseUrl: .*|baseUrl: process.env.CYPRESS_BASE_URL || 'http://localhost:3000',|" cypress.config.ts
          echo "--- cypress.config.ts ---"
          cat cypress.config.ts

      - name: Install frontend dependencies
        working-directory: gestao-os-pim
        run: npm ci

      - name: Run frontend unit tests
        working-directory: gestao-os-pim
        run: npm test -- --watch=false

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: gestao-os-pim
          browser: chrome
          headed: false
          install: false
        env:
          CYPRESS_BASE_URL: http://localhost:3000
          CYPRESS_supervisor_email: supervisor@seed.local
          CYPRESS_supervisor_senha: seed123

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: gestao-os-pim/cypress/screenshots
          if-no-files-found: ignore

      - name: Show docker logs on failure
        if: failure()
        working-directory: gestao-os-pim
        run: |
          echo "=== docker compose ps ==="
          docker compose -f docker-compose.e2e.yml ps
          echo "=== API logs ==="
          docker compose -f docker-compose.e2e.yml logs api
          echo "=== Frontend logs ==="
          docker compose -f docker-compose.e2e.yml logs frontend

      - name: Teardown E2E environment
        if: always()
        working-directory: gestao-os-pim
        run: docker compose -f docker-compose.e2e.yml down -v
